<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#090B0C"/>

  <!-- Terminal prompt: >_ -->
  <!-- ">" chevron -->
  <polyline
    points="96,176 176,256 96,336"
    fill="none"
    stroke="#00DDD4"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- "_" underscore cursor -->
  <line
    x1="208" y1="336"
    x2="416" y2="336"
    stroke="#00DDD4"
    stroke-width="44"
    stroke-linecap="round"
  />

  <!-- Subtle teal glow ring (optional, very faint) -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00DDD4" stroke-width="2" opacity="0.12"/>
</svg>
